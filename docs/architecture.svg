<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 560" font-family="Georgia, serif">
<rect width="920" height="560" fill="#FAF8F4"/>
<text x="40" y="44" font-size="26" fill="#1A1A1A" font-weight="bold">sworn — architecture &amp; trust boundaries</text>
<text x="40" y="68" font-size="13" fill="#6B6B6B" font-family="monospace">pattern: claude code agent + custom read-only mcp tools + hash-chained ledger</text>

<!-- agent -->
<rect x="40" y="100" width="200" height="70" rx="8" fill="#fff" stroke="#E2DCD4"/>
<text x="60" y="130" font-size="15" fill="#1A1A1A" font-weight="bold">claude code agent</text>
<text x="60" y="152" font-size="11" fill="#6B6B6B" font-family="monospace">reasons, sequences, narrates</text>

<!-- sworn tools -->
<rect x="320" y="100" width="240" height="70" rx="8" fill="#fff" stroke="#E2DCD4"/>
<text x="340" y="130" font-size="15" fill="#1A1A1A" font-weight="bold">sworn typed tools</text>
<text x="340" y="152" font-size="11" fill="#6B6B6B" font-family="monospace">mft · amcache · prefetch · injection</text>

<!-- evidence -->
<rect x="650" y="100" width="220" height="70" rx="8" fill="#fff" stroke="#E2DCD4"/>
<text x="670" y="130" font-size="15" fill="#1A1A1A" font-weight="bold">evidence (E01)</text>
<text x="670" y="152" font-size="11" fill="#6B6B6B" font-family="monospace">read-only mount, mode 0444</text>

<!-- ledger -->
<rect x="320" y="260" width="240" height="70" rx="8" fill="#F7C8D8" stroke="#D98AA6"/>
<text x="340" y="290" font-size="15" fill="#1A1A1A" font-weight="bold">hash-chained ledger</text>
<text x="340" y="312" font-size="11" fill="#1A1A1A" font-family="monospace">append-only · tamper-evident</text>

<!-- report -->
<rect x="320" y="400" width="240" height="70" rx="8" fill="#fff" stroke="#E2DCD4"/>
<text x="340" y="430" font-size="15" fill="#1A1A1A" font-weight="bold">structured finding + log</text>
<text x="340" y="452" font-size="11" fill="#6B6B6B" font-family="monospace">every claim -&gt; a receipt</text>

<!-- arrows -->
<line x1="240" y1="135" x2="318" y2="135" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="560" y1="135" x2="648" y2="135" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="440" y1="170" x2="440" y2="258" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#a)"/>
<line x1="440" y1="330" x2="440" y2="398" stroke="#1A1A1A" stroke-width="1.5" marker-end="url(#a)"/>
<defs><marker id="a" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6" fill="#1A1A1A"/></marker></defs>

<!-- trust boundary legend -->
<rect x="40" y="260" width="240" height="210" rx="8" fill="none" stroke="#D98AA6" stroke-dasharray="5,4"/>
<text x="56" y="288" font-size="14" fill="#D98AA6" font-weight="bold">ARCHITECTURAL guardrails</text>
<text x="56" y="312" font-size="11" fill="#1A1A1A">• read-only mount (OS layer)</text>
<text x="56" y="332" font-size="11" fill="#1A1A1A">• no write function in tool schema</text>
<text x="56" y="352" font-size="11" fill="#1A1A1A">• append-only ledger (no rewrite path)</text>
<text x="56" y="372" font-size="11" fill="#1A1A1A">• evidence quarantined as data</text>
<text x="56" y="406" font-size="13" fill="#6B6B6B" font-weight="bold">PROMPT-based (weaker)</text>
<text x="56" y="428" font-size="11" fill="#6B6B6B">• agent investigative judgment</text>
<text x="56" y="448" font-size="11" fill="#6B6B6B">• narrative tone</text>

<text x="650" y="290" font-size="13" fill="#1A1A1A" font-weight="bold">three guarantees</text>
<text x="650" y="314" font-size="11" fill="#1A1A1A">1. cannot spoliate (read-only)</text>
<text x="650" y="334" font-size="11" fill="#1A1A1A">2. cannot fabricate (receipt req'd)</text>
<text x="650" y="354" font-size="11" fill="#1A1A1A">3. cannot be hijacked (data, not</text>
<text x="650" y="370" font-size="11" fill="#1A1A1A">   instructions)</text>
</svg>